                    const obj = objLoader.parse(e.target.result);
                    addLoadedObject(obj, file.name);
                } catch (err) {
                    console.error('[Viewer] OBJ parse failed:', err);
                    alert(`OBJ 파싱 실패: ${file.name}\n${err.message}`);
                }
            };
            reader.onerror = () => console.error('[Viewer] read failed:', file.name);
            reader.readAsText(file);
        }

        function load3dmFile(file) {
            console.info(`[Viewer] 3DM load start: ${file.name} (${file.size} bytes)`);
            const reader = new FileReader();
            reader.onload = (e) => {
                const buffer = e.target.result;
                console.info(`[Viewer] 3DM file read → ArrayBuffer(${buffer.byteLength}), calling parse...`);
                try {
                    rhinoLoader.parse(
                        buffer,
                        (object) => {
                            // 3DM 파싱 결과 진단: mesh / curve / 기타 개수와 bbox 출력.
                            // Rhino 파일이 NURBS만 있고 render mesh가 없으면 mesh 0.
                            let meshCount = 0, lineCount = 0, pointsCount = 0, otherCount = 0;
                            object.traverse((c) => {
                                if (c.isMesh) meshCount++;
                                else if (c.isLine) lineCount++;
                                else if (c.isPoints) pointsCount++;
                                else if (c !== object && !c.isGroup) otherCount++;
                            });
                            const bbox = new THREE.Box3().setFromObject(object);
                            console.info(`[Viewer] 3DM parse success: ${file.name}`, {
                                totalChildren: object.children.length,
                                meshCount, lineCount, pointsCount, otherCount,
                                bboxMin: bbox.min.toArray().map(v => +v.toFixed(3)),
                                bboxMax: bbox.max.toArray().map(v => +v.toFixed(3)),
                                bboxEmpty: bbox.isEmpty(),
                                warnings: object.userData?.warnings?.length || 0,
                            });
                            if (meshCount === 0 && lineCount === 0 && pointsCount === 0) {
                                alert(
                                    `3DM 파일이 로드됐지만 렌더링할 지오메트리가 없습니다: ${file.name}\n\n` +
                                    `원인 후보:\n` +
                                    `• Rhino에서 NURBS만 있고 render mesh 미저장\n` +
                                    `  → File > Save As > Options > "Save render meshes" 체크\n` +
                                    `• 또는 Rhino에서 _Mesh 명령으로 메시화 후 저장\n` +
                                    `• 블록 인스턴스만 있는 경우\n\n` +
                                    `콘솔 로그의 warnings 개수를 확인하세요.`
                                );
                            }
                            addLoadedObject(object, file.name);
                        },
                        (err) => {
                            console.error('[Viewer] 3DM parse failed (onError):', err);
                            alert(
                                `3DM 파싱 실패: ${file.name}\n` +
                                `${err?.message || err}\n\n` +
                                `(개발자 도구 콘솔에서 자세한 에러를 확인하세요)`
                            );
                        },
                    );
                } catch (err) {
                    console.error('[Viewer] 3DM parse threw sync:', err);
                    alert(
                        `3DM 로딩 오류 (동기): ${file.name}\n` +
                        `${err?.message || err}`
                    );
                }
            };
            reader.onerror = (e) => {
                console.error('[Viewer] FileReader error:', e);
                alert(`파일 읽기 실패: ${file.name}`);
            };
            reader.readAsArrayBuffer(file);
        }

        // 첫 3DM 로드 시점에 라이브러리를 처음 받으면 몇 초 지연되어 사용자에게
        // "멈췄나?" 보일 수 있음. 페이지 로드 직후 미리 warm-up 해서 CDN 접근성도
        // 이 시점에 알 수 있게 한다.
        (async () => {
            try {
                await rhinoLoader._initLibrary();
                console.info('[Viewer] rhino3dm library initialized (pre-warm OK)');
            } catch (err) {
                console.error('[Viewer] rhino3dm library init FAILED:', err);
                console.error('  → check: jsdelivr CDN reachable? offline? adblock?');
                // 이건 조용히 두고, 실제 드롭 시점에 에러로 다시 뜸
            }
        })();

        // ── Import Collider (admin) ─────────────────────────────────────
        // OBJ/3DM 파일을 보이지 않는 collider 로 추가. 렌더 없음, 충돌만.
        // loadedModels / objGroup 과 분리된 colliderGroup 에 붙음.
        const $btnImportCollider = document.getElementById('btn-import-collider');
        const $colliderFileInput = document.getElementById('collider-file-input');

        function addColliderObject(obj, name) {
            // Mesh 재료는 남겨두되 렌더링 자체가 일어나지 않으므로 시각화 의미 없음.
            // 단순히 userData 플래그만 남김.
            obj.traverse((c) => {
                if (c.isMesh) c.userData.isCollider = true;
            });
            colliderGroup.add(obj);
            // 자동으로 mesh collision 활성화 (없으면 collider 추가해도 무효)
            if (!meshColliderState.enabled) {
                meshColliderState.enabled = true;
                if (typeof renderModelList === 'function') renderModelList();
            }
            const meshCount = (() => { let n = 0; obj.traverse(c => { if (c.isMesh) n++; }); return n; })();
            console.info(`[Viewer] collider loaded: ${name} (${meshCount} mesh)`);
            alert(`✓ Collider 추가 완료: ${name}\n(${meshCount} mesh — 보이지 않음 / 통과 불가)`);
        }

        function loadColliderObj(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const obj = objLoader.parse(e.target.result);
                    addColliderObject(obj, file.name);
                } catch (err) {
                    console.error('[Viewer] collider OBJ parse failed:', err);
                    alert(`Collider OBJ 파싱 실패: ${file.name}\n${err.message}`);
                }
            };
            reader.onerror = () => console.error('[Viewer] read failed:', file.name);
            reader.readAsText(file);
        }

        function loadCollider3dm(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const buffer = e.target.result;
                try {
                    rhinoLoader.parse(
                        buffer,
                        (object) => {
                            let meshCount = 0;
                            object.traverse(c => { if (c.isMesh) meshCount++; });
                            if (meshCount === 0) {
                                alert(`Collider 3DM 에 mesh 가 없습니다: ${file.name}\n(Rhino 에서 render mesh 저장 또는 _Mesh 후 저장 필요)`);
                                return;
                            }
                            addColliderObject(object, file.name);
                        },
                        (err) => {
                            console.error('[Viewer] collider 3DM parse failed:', err);
                            alert(`Collider 3DM 파싱 실패: ${file.name}\n${err?.message || err}`);
                        },
                    );
                } catch (err) {
                    console.error('[Viewer] collider 3DM parse threw:', err);
                    alert(`Collider 3DM 로딩 오류: ${file.name}\n${err?.message || err}`);
                }
            };
            reader.onerror = () => alert(`파일 읽기 실패: ${file.name}`);
            reader.readAsArrayBuffer(file);
        }

        function handleColliderFiles(fileList) {
            const files = Array.from(fileList || []);
            let matched = 0;
            for (const f of files) {
                if (/\.obj$/i.test(f.name))      { loadColliderObj(f); matched++; }
                else if (/\.3dm$/i.test(f.name)) { loadCollider3dm(f); matched++; }
            }
            if (matched === 0) alert('지원 형식: .obj, .3dm');
        }

        $btnImportCollider?.addEventListener('click', () => {
            if (!requireAdmin('importCollider')) return;
            $colliderFileInput.click();
        });
        $colliderFileInput?.addEventListener('change', (e) => {
            if (e.target.files?.length) handleColliderFiles(e.target.files);
            $colliderFileInput.value = ''; // 같은 파일 재선택 가능
        });

        function handleFiles(fileList) {
            const files = Array.from(fileList);
            let matched = 0;
            files.forEach((file) => {
                if (/\.obj$/i.test(file.name)) {
                    loadObjFile(file);
                    matched++;
                } else if (/\.3dm$/i.test(file.name)) {
                    load3dmFile(file);
                    matched++;
                }
            });
            if (matched === 0) {
                console.warn('[Viewer] no supported files in drop (expected .obj / .3dm)');
            }
        }

        // Drag events on window
        let dragDepth = 0;
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragDepth++;
            $dropOverlay.classList.add('active');
        });
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragDepth = Math.max(0, dragDepth - 1);
            if (dragDepth === 0) $dropOverlay.classList.remove('active');
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragDepth = 0;
            $dropOverlay.classList.remove('active');
            if (e.dataTransfer?.files?.length) {
                handleFiles(e.dataTransfer.files);
            }
        });

        // 메시에 음영(입체감)이 생기도록 라이팅 구성.
        // - Ambient: 약하게 → 그림자 영역이 완전 검정이 되지 않게 최소 밝기
        // - Hemisphere: 하늘/땅 컬러 차이로 위/아래 톤 분리
        // - Directional: 주광 — 사선 각도로 쏴서 면마다 밝기 차이 발생 (음영의 핵심)
        // Gaussian Splat은 이 조명에 영향받지 않음 (자체 색상 사용).
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));

        const hemi = new THREE.HemisphereLight(0xbcd7ff, 0x443322, 0.55);
        hemi.position.set(0, 1, 0);
        scene.add(hemi);

        const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
        // 오른쪽 위 사선에서 비추기 — 세 축에 각각 다른 밝기가 잡혀 음영이 명확해짐
        keyLight.position.set(8, 14, 6);
        keyLight.target.position.set(0, 0, 0);
        scene.add(keyLight);
        scene.add(keyLight.target);

        // 반대편에서 약하게 채우는 fill light — 그림자 영역이 너무 어둡지 않게
        const fillLight = new THREE.DirectionalLight(0xa8c8ff, 0.35);
        fillLight.position.set(-6, 4, -4);
        scene.add(fillLight);

        // ── Transform gizmo (선택 + 이동/회전/스케일) ──
        // 클릭 시 drag가 아닌 순수 click만 "선택"으로 간주. drag은 기존 FPS look을 침범하지 않도록.
        const transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.setSize(0.8);
        scene.add(transformControls);

        // gizmo 드래그 동안 FPS controls / 내부 look 벡터 비활성화.
        let gizmoDragging = false;
        transformControls.addEventListener('dragging-changed', (ev) => {
            gizmoDragging = ev.value;
            if (ev.value) {
                controls.enabled = false;
                // 드래그 시작 시점에 남아있는 조이스틱/키 입력 중립화
                moveVec.x = 0; moveVec.y = 0;
                lookVec.x = 0; lookVec.y = 0;
            } else {
                controls.enabled = true; // 원래대로
            }
        });

        // 선택 대상은 개별 mesh(leaf)가 기본. Alt/Shift+Click 시 root 모델 전체.
        // selectedObject: 현재 gizmo에 붙은 Object3D (root 또는 sub-mesh)
        // selectedRootId: UI 하이라이트용 — 해당 object가 속한 loadedModel.id
        let selectedObject = null;
        let selectedRootId = null;

        const $txPanel = document.getElementById('transform-panel');
        const $txName = document.getElementById('tx-name');
        const $txTranslate = document.getElementById('tx-translate');
        const $txRotate = document.getElementById('tx-rotate');
        const $txScale = document.getElementById('tx-scale');
        const $txDelete = document.getElementById('tx-delete');
        const $txDeselect = document.getElementById('tx-deselect');

        function setGizmoMode(mode) {
            transformControls.setMode(mode);
            $txTranslate.dataset.on = String(mode === 'translate');
            $txRotate.dataset.on = String(mode === 'rotate');
            $txScale.dataset.on = String(mode === 'scale');
        }

        // object 또는 그 조상 중 loadedModels에 등록된 root를 찾음
        function findRootModelOf(obj) {
            let cur = obj;
            while (cur) {
                const m = loadedModels.find(x => x.object === cur);
                if (m) return m;
                cur = cur.parent;
            }
            return null;
        }

        // 선택 하이라이트: 메시의 EdgesGeometry를 뽑아 LineSegments로 덧붙임.
        // 메시의 자식으로 추가하기 때문에 gizmo로 움직여도 자동으로 따라옴.
        // depthTest: false 로 메시 내부/뒷면에서도 보이게.
        const SELECTION_COLOR = 0x78c8ff;
        const EDGE_ANGLE_THR = 15; // 각도 이상일 때만 edge로 간주

        function applyHighlight(obj) {
            obj.traverse((c) => {
                if (c.isMesh && !c.userData._highlightEdge) {
                    const edges = new THREE.EdgesGeometry(c.geometry, EDGE_ANGLE_THR);
                    const mat = new THREE.LineBasicMaterial({
                        color: SELECTION_COLOR,
                        depthTest: false,
                        transparent: true,
                        opacity: 0.9,
                    });
                    const line = new THREE.LineSegments(edges, mat);
                    line.renderOrder = 999;
                    line.userData._isHighlight = true;
                    c.add(line);
                    c.userData._highlightEdge = line;
                }
            });
        }

        function removeHighlight(obj) {
            obj.traverse((c) => {
                if (c.userData._highlightEdge) {
                    const line = c.userData._highlightEdge;
                    c.remove(line);
                    line.geometry.dispose();
                    line.material.dispose();
                    delete c.userData._highlightEdge;
                }
            });
        }

        function selectObject(obj) {
            if (!obj) return;
            // 이전 선택 하이라이트 제거
            if (selectedObject) removeHighlight(selectedObject);
            selectedObject = obj;
            const root = findRootModelOf(obj);
            selectedRootId = root ? root.id : null;
            transformControls.attach(obj);
            $txPanel.classList.add('active');
            // 표시 이름: 루트면 파일명, 하위면 "파일명 › 메시명"
            const subName = obj.name && obj.name.trim() ? obj.name : '(unnamed)';
            if (root && obj === root.object) {
                $txName.textContent = root.name;
                $txName.title = root.name;
            } else if (root) {
                const label = `${root.name} › ${subName}`;
                $txName.textContent = label;
                $txName.title = label;
            } else {
                $txName.textContent = subName;
                $txName.title = subName;
            }
            setGizmoMode(transformControls.mode || 'translate');
            applyHighlight(obj);
            renderModelList(); // 선택 하이라이트 갱신
            console.info(`[Viewer] selected:`, obj.name || '(unnamed)',
                'root:', root?.name);
        }

        function deselectObject() {
            if (!selectedObject) return;
            removeHighlight(selectedObject);
            transformControls.detach();
            selectedObject = null;
            selectedRootId = null;
            $txPanel.classList.remove('active');
            renderModelList();
        }

        function disposeObject3D(obj) {
            obj.traverse((c) => {
                if (c.isMesh) {
                    c.geometry?.dispose();
                    if (Array.isArray(c.material)) {
                        c.material.forEach(mm => mm.dispose());
                    } else {
                        c.material?.dispose();
                    }
                }
            });
        }

        function deleteSelected() {
            if (!selectedObject) return;
            const obj = selectedObject;
            const root = findRootModelOf(obj);
            deselectObject();

            // 이 객체(또는 그 자식) 에 붙어있던 annotation 핀들 DOM/목록에서 정리
            if (typeof cleanupAnnotationsFor === 'function') {
                cleanupAnnotationsFor(obj);
            }

            if (root && obj === root.object) {
                // Root 전체 삭제 → loadedModels에서도 제거
                const idx = loadedModels.findIndex(m => m.id === root.id);
                objGroup.remove(obj);
                disposeObject3D(obj);
                if (idx >= 0) loadedModels.splice(idx, 1);
            } else {
                // Sub-mesh만 삭제 → 부모에서 제거 (loadedModels 엔트리는 유지)
                obj.parent?.remove(obj);
                disposeObject3D(obj);
            }
            renderModelList();
        }

        $txTranslate.addEventListener('click', () => setGizmoMode('translate'));
        $txRotate.addEventListener('click', () => setGizmoMode('rotate'));
        $txScale.addEventListener('click', () => setGizmoMode('scale'));
        $txDelete.addEventListener('click', deleteSelected);
        $txDeselect.addEventListener('click', deselectObject);

        // ── 클릭 vs 드래그 구분해서 선택 처리 ──
        // renderer.domElement에서 pointerdown 시 위치/시간 기록 →
        // pointerup 시 이동 거리 작고 시간 짧으면 click → raycast.
        const CLICK_PIX_THR = 6;
        const CLICK_MS_THR = 300;
        let pDownX = 0, pDownY = 0, pDownT = 0, pDownBtn = -1;
        const _selectRaycaster = new THREE.Raycaster();
        // 기본 layer 0 + SCAN_LAYER 둘 다 테스트 → scan mesh 도 hit 가능
        _selectRaycaster.layers.enable(SCAN_LAYER);
        const _ndc = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (gizmoDragging) return;
            pDownX = e.clientX; pDownY = e.clientY;
            pDownT = performance.now();
            pDownBtn = e.button;
        }, { passive: true });

        renderer.domElement.addEventListener('pointerup', (e) => {
            if (gizmoDragging) return;
            if (pDownBtn !== 0) return; // 좌클릭만
            const dx = e.clientX - pDownX;
            const dy = e.clientY - pDownY;
            const dt = performance.now() - pDownT;
            if (Math.hypot(dx, dy) > CLICK_PIX_THR || dt > CLICK_MS_THR) return;

            // click → raycast
            const rect = renderer.domElement.getBoundingClientRect();
            _ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            _ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            _selectRaycaster.setFromCamera(_ndc, camera);

            // 로드된 모델 mesh + scan mesh 모두 수집.
            // selection 에선 scan mesh 제외, 핀 배치에선 둘 다 허용.
            const meshes = [];
            const meshToModelId = new Map();
            for (const m of loadedModels) {
                if (!m.visible) continue;
                m.object.traverse((c) => {
                    if (c.isMesh) {
                        meshes.push(c);
                        meshToModelId.set(c, m.id);
                    }
                });
            }
            // 스캔 메시 포함 (pin placement raycast 용)
            scanObjGroup.traverse((c) => {
                if (c.isMesh && c.userData.isScanMesh) {
                    meshes.push(c);
                }
            });

            // 핀 추가 모드: scan mesh 포함 모든 hit 허용
            if (annotationPlacingMode) {
                if (meshes.length === 0) {
                    console.info('[Viewer] 주석 배치: 클릭 가능한 mesh 없음 — OBJ/3dm 드롭하거나 CSV 에 mesh URL 지정');
                    setPlacingMode(false);
                    return;
                }
                const annoHits = _selectRaycaster.intersectObjects(meshes, false);
                if (annoHits.length > 0) {
                    pendingAnnotationTarget = annoHits[0].object;
                    pendingAnnotationPoint = annoHits[0].point.clone();
                    editingAnnotationId = null;
                    $annoTitle.value = '';
                    $annoBody.value = '';
                    openAnnotationModal({ isNew: true });
                } else {
                    console.info('[Viewer] 주석 배치: 메시/스캔면을 클릭해야 합니다');
                }
                setPlacingMode(false);
                return;
            }

            if (meshes.length === 0) {
                deselectObject();
                return;
            }

            const hits = _selectRaycaster.intersectObjects(meshes, false);
            // selection 에선 scan mesh 제외 (보이지 않는 객체를 gizmo 로 조작하면 혼란)
            const selectableHits = hits.filter(h => !h.object.userData.isScanMesh);

            if (selectableHits.length > 0) {
                // 기본: 개별 mesh(leaf) 선택 — USD처럼 자식별 독립 조작 가능
                // Alt/Shift+Click: 해당 모델의 root 전체를 한 덩어리로 선택
                const selectRoot = e.altKey || e.shiftKey;
                if (selectRoot) {
                    const id = meshToModelId.get(selectableHits[0].object);
                    const root = loadedModels.find(m => m.id === id);
                    if (root) selectObject(root.object);
                } else {
                    selectObject(selectableHits[0].object);
                }
            } else {
                deselectObject();
            }
        }, { passive: true });

        // 키보드 단축키: Esc 해제, G/R/S 모드 변경 (선택됐을 때만)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // 주석 모달이 열려있으면 모달 닫기 우선
                if ($annoModal && $annoModal.classList.contains('open')) {
                    closeAnnotationModal();
                    return;
                }
                // placing 모드면 취소
                if (annotationPlacingMode) {
                    setPlacingMode(false);
                    return;
                }
                deselectObject();
                return;
            }
            if (selectedObject === null) return;
            // FPS controls와 충돌 피하려고 선택된 상태에서만 처리
            if (e.key === 'g' || e.key === 'G') setGizmoMode('translate');
            else if (e.key === 't' || e.key === 'T') setGizmoMode('rotate'); // R은 height up이라 T로
            else if (e.key === 'y' || e.key === 'Y') setGizmoMode('scale');
            else if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
        });

        // ── Annotations (3D 핀 + 모달) ──
        // 각 annotation 은 target mesh 의 자식 Object3D (anchor) 를 가져서
        // 메시가 gizmo 로 이동/회전/스케일 되어도 자동으로 따라옴.
        // 매 프레임 anchor.getWorldPosition() 을 project → HTML 버튼 CSS transform.
        const annotations = []; // { id, target, anchor, title, body, $pin, hidesTarget }
        let annotationIdSeq = 0;
        let annotationPlacingMode = false;
        let editingAnnotationId = null; // 모달이 편집 중인 annotation id (새거면 null)
        let pendingAnnotationTarget = null; // 새로 추가 중인 annotation 의 target
        let pendingAnnotationPoint = null;  // 새로 추가 중인 world-space hit point
        let pendingHidesTarget = false;     // 저장 시 target 메시를 숨길지 여부

        const $btnAnnotate = document.getElementById('btn-annotate');
        const $annoModal = document.getElementById('anno-modal');
        const $annoModalLabel = document.getElementById('anno-modal-label');
        const $annoTitle = document.getElementById('anno-title-input');
        const $annoBody = document.getElementById('anno-body-input');
        const $annoSave = document.getElementById('anno-save-btn');
        const $annoCancel = document.getElementById('anno-cancel-btn');
        const $annoDelete = document.getElementById('anno-delete-btn');

        function setPlacingMode(on) {
            annotationPlacingMode = on;
            document.body.classList.toggle('anno-placing', on);
            $btnAnnotate.textContent = on ? '× CANCEL' : '+ NOTE';
        }

        function openAnnotationModal({ isNew }) {
            $annoModal.classList.add('open');
            $annoModalLabel.textContent = isNew ? 'New Annotation' : 'Annotation';
            $annoDelete.style.display = isNew ? 'none' : '';
            // FPS 컨트롤 비활성화 → 입력창에 W/A/S/D/R/F 를 쳐도 카메라가 움직이지 않음
            if (controls) {
                controls.enabled = false;
                controls.moveForward = false;
                controls.moveBackward = false;
                controls.moveLeft = false;
                controls.moveRight = false;
                controls.moveUp = false;
                controls.moveDown = false;
                controls.sprint = false;
            }
            setTimeout(() => $annoTitle.focus(), 50);
        }

        function closeAnnotationModal() {
            $annoModal.classList.remove('open');
            editingAnnotationId = null;
            pendingAnnotationTarget = null;
            pendingAnnotationPoint = null;
            pendingHidesTarget = false;
            // FPS 컨트롤 재활성화 + 이동 상태 초기화 (모달 내 타이핑으로 쌓인 키 상태 제거)
            if (controls) {
                controls.moveForward = false;
                controls.moveBackward = false;
                controls.moveLeft = false;
                controls.moveRight = false;
                controls.moveUp = false;
                controls.moveDown = false;
                controls.sprint = false;
                controls.enabled = true;
            }
        }

        function createAnnotation(target, worldPoint, title, body, hidesTarget) {
            const anchor = new THREE.Object3D();
            const local = target.worldToLocal(worldPoint.clone());
            anchor.position.copy(local);
            // anchor 는 target 을 부모로 쓰지만 target.visible=false 여도 보이도록
            // anchor 를 target 의 부모(parent) 에 직접 붙이면 hidden 메시의 영향을 안 받음.
            // 그런데 target 이 gizmo 로 이동하면 anchor 는 따라가지 않게 됨.
            // 따라서 anchor 는 여전히 target 의 자식으로 두되, 위치 계산에만 사용.
            // Object3D.getWorldPosition() 는 visible 상태와 무관하게 계산되므로 핀은 HTML 로 잘 뜬다.
            target.add(anchor);

            const id = ++annotationIdSeq;
            // DOM 생성은 modules/notes/annotation-pins.js 로 이동
            const { $pin, $bubble, $bubbleEdit, $bubbleDelete } =
                createAnnotationDOM({ title, body });

            $pin.addEventListener('click', (ev) => {
                ev.stopPropagation();
                const a = annotations.find(x => x.id === id);
                if (!a) return;
                // 핀 클릭 → 말풍선 토글 (다른 말풍선은 닫음)
                const wasOpen = !a.$bubble.classList.contains('hidden');
                for (const other of annotations) {
                    if (other !== a) {
                        other.$bubble.classList.add('hidden');
                        if (other.$pin) other.$pin.textContent = '+';
                    }
                }
                if (wasOpen) {
                    a.$bubble.classList.add('hidden');
                    a.$pin.textContent = '+';
                } else {
                    a.$bubble.querySelector('.anno-bubble-title').textContent = a.title || '(제목 없음)';
                    a.$bubble.querySelector('.anno-bubble-body').textContent = a.body || '';
                    a.$bubble.classList.remove('hidden');
                    a.$pin.textContent = '−';
                }
            });

            $bubbleEdit.addEventListener('click', (ev) => {
                ev.stopPropagation();
                const a = annotations.find(x => x.id === id);
                if (!a) return;
                a.$bubble.classList.add('hidden');
                if (a.$pin) a.$pin.textContent = '+';
                editingAnnotationId = id;
                $annoTitle.value = a.title || '';
                $annoBody.value = a.body || '';
                openAnnotationModal({ isNew: false });
            });

            $bubbleDelete.addEventListener('click', (ev) => {
                ev.stopPropagation();
                if (confirm('이 주석을 삭제할까요?')) {
                    removeAnnotation(id);
                }
            });

            // ($pin, $bubble 은 createAnnotationDOM 이 이미 document.body 에 append + bubble 내부 click stop 처리)

            // hidesTarget 이면 메시 숨김 → 핀만 공중에 떠 있는 효과
            if (hidesTarget) {
                target.visible = false;
            }

            const annoObj = { id, target, anchor, title, body, $pin, $bubble, hidesTarget: !!hidesTarget, saved: false };
            annotations.push(annoObj);
            return annoObj;
        }

        function removeAnnotation(id) {
            const idx = annotations.findIndex(a => a.id === id);
            if (idx < 0) return;
            const a = annotations[idx];
            // 이 annotation 이 메시를 숨겼다면 삭제 시 원복
            if (a.hidesTarget && a.target) {
                a.target.visible = true;
            }
            // 저장된 노트 삭제면 deletions 기록 (CSV 재생성 시 제외)
            if (typeof markNoteDeleted === 'function') markNoteDeleted(a);
            a.target?.remove?.(a.anchor);
            a.$pin?.remove();
            a.$bubble?.remove();
            annotations.splice(idx, 1);
        }

        // 핀 추가 버튼
        // 1) 이미 placing 모드면 → 취소
        // 2) 선택된 mesh 가 있으면 → 그 mesh bbox 중심에 바로 핀 생성 (모달 열기)
        // 3) 아무것도 선택 안 돼 있으면 → placing 모드 (커서 + 클릭) 로 진입
        const _annoBBox = new THREE.Box3();
        const _annoCenter = new THREE.Vector3();
        const $btnAnnotateInvis = document.getElementById('btn-annotate-invis');

        function openAnnotationOnSelected({ hidesTarget }) {
            _annoBBox.setFromObject(selectedObject);
            if (_annoBBox.isEmpty()) {
                console.warn('[Viewer] 선택된 객체에 지오메트리가 없어 핀 생성 불가');
                return false;
            }
            _annoBBox.getCenter(_annoCenter);
            pendingAnnotationTarget = selectedObject;
            pendingAnnotationPoint = _annoCenter.clone();
            pendingHidesTarget = !!hidesTarget;
            editingAnnotationId = null;
            $annoTitle.value = '';
            $annoBody.value = '';
            openAnnotationModal({ isNew: true });
            return true;
        }

        $btnAnnotate.addEventListener('click', () => {
            if (!requireAdmin('addNote')) return;
            if (annotationPlacingMode) {
                setPlacingMode(false);
                return;
            }
            if (selectedObject) {
                if (openAnnotationOnSelected({ hidesTarget: false })) return;
                setPlacingMode(true);
                return;
            }
            setPlacingMode(true);
        });

        // + INV NOTE : 반드시 mesh 가 선택돼 있어야 함.
        // 저장 시 createAnnotation 이 target.visible=false 로 설정 → 메시는 사라지고 + 핀만 남음.
        $btnAnnotateInvis.addEventListener('click', () => {
            if (!requireAdmin('addInvisibleNote')) return;
            if (annotationPlacingMode) {
                setPlacingMode(false);
            }
            if (!selectedObject) {
                alert('메시를 먼저 선택하세요.\n\n사용법:\n1) 메시 클릭 → 선택\n2) + INV NOTE 클릭\n\n저장하면 메시는 숨겨지고 + 핀만 남습니다.');
                return;
            }
            openAnnotationOnSelected({ hidesTarget: true });
        });

        // 모달 버튼
        $annoSave.addEventListener('click', () => {
            const title = $annoTitle.value.trim() || '(제목 없음)';
            const body = $annoBody.value;
            if (editingAnnotationId !== null) {
                // 기존 수정
                const a = annotations.find(x => x.id === editingAnnotationId);
                if (a) {
                    a.title = title;
                    a.body = body;
                    a.$pin.title = title;
                    // 편집 시 저장 상태 해제 → 빨강으로 다시 표시
                    a.saved = false;
                    a.$pin.classList.add('unsaved');
                    // 열려 있던 말풍선 내용도 동기화
                    if (a.$bubble) {
                        const $t = a.$bubble.querySelector('.anno-bubble-title');
                        const $b = a.$bubble.querySelector('.anno-bubble-body');
                        if ($t) $t.textContent = a.title || '(제목 없음)';
                        if ($b) $b.textContent = a.body || '';
                    }
                }
            } else if (pendingAnnotationTarget && pendingAnnotationPoint) {
                // 새로 생성
                createAnnotation(
                    pendingAnnotationTarget, pendingAnnotationPoint, title, body,
                    pendingHidesTarget,
                );
                // invisible note 로 만든 경우, 숨겨진 메시에 gizmo 가 붙어있으면 헷갈리므로 해제
                if (pendingHidesTarget) deselectObject();
            }
            closeAnnotationModal();
        });

        // 모든 카드 열기 / 접기
        const $btnExpandAll = document.getElementById('btn-expand-all');
        const $btnCollapseAll = document.getElementById('btn-collapse-all');
        $btnExpandAll?.addEventListener('click', () => {
            for (const a of annotations) {
                if (!a.$bubble) continue;
                const $t = a.$bubble.querySelector('.anno-bubble-title');
                const $b = a.$bubble.querySelector('.anno-bubble-body');
                if ($t) $t.textContent = a.title || '(제목 없음)';
                if ($b) $b.textContent = a.body || '';
                a.$bubble.classList.remove('hidden');
                if (a.$pin) a.$pin.textContent = '−';
            }
        });
        $btnCollapseAll?.addEventListener('click', () => {
            for (const a of annotations) {
                if (a.$bubble) a.$bubble.classList.add('hidden');
                if (a.$pin) a.$pin.textContent = '+';
            }
        });

        $annoCancel.addEventListener('click', closeAnnotationModal);
        $annoModal.addEventListener('click', (e) => {
            if (e.target === $annoModal) closeAnnotationModal();
        });

        $annoDelete.addEventListener('click', () => {
            if (editingAnnotationId !== null) {
                if (confirm('이 주석을 삭제할까요?')) {
                    removeAnnotation(editingAnnotationId);
                    closeAnnotationModal();
                }
            }
        });

        // ══════════════════════════════════════════════════════════════════
        // Notes persistence (SAVE NOTES → notes.csv + localStorage)
        // localStorage 헬퍼 / CSV 파서 / rowKey 는 modules/persistence/* 로 이동.
        // ══════════════════════════════════════════════════════════════════

        // buildUpdatedNotesCsv 는 modules/notes/notes-storage.js 로 이동 (import 됨).

        // SAVE NOTES — 이 씬의 모든 노트를 CSV + localStorage 에 저장
        async function saveAllNotes() {
            if (!requireAdmin('saveAllNotes')) return;
            const sceneMatch = extractSceneMatch(DATA_PATH);
            const worldPos = new THREE.Vector3();
            const currentSceneRows = [];
            for (const a of annotations) {
                a.anchor.getWorldPosition(worldPos);
                currentSceneRows.push({
                    scene_match: sceneMatch,
                    world_px: +worldPos.x.toFixed(3),
                    world_py: +worldPos.y.toFixed(3),
                    world_pz: +worldPos.z.toFixed(3),
                    title: a.title || '',
                    body: a.body || '',
                });
            }
            // localStorage userNotes 에서 현재 씬 행 전부 치환
            const allUser = loadUserNotes();
            const otherScene = allUser.filter(r => r.scene_match !== sceneMatch);
            saveUserNotes([...otherScene, ...currentSceneRows]);
            // 현재 씬의 삭제 기록은 "현재 씬에 존재하는" 키들만 남기고 clean up
            const currentKeys = new Set(currentSceneRows.map(r => noteRowKey(r.scene_match, r.world_px, r.world_py, r.world_pz)));
            const deletions = loadNoteDeletions().filter(k => !currentKeys.has(k));
            saveNoteDeletions(deletions);

            // 화면 핀 빨강 → 파랑
            for (const a of annotations) {
                a.saved = true;
                a.$pin.classList.remove('unsaved');
            }

            // CSV 다운로드
            const csvText = await buildUpdatedNotesCsv();
            console.info('─── notes.csv after save (덮어쓰기용) ───');
            console.info(csvText);
            downloadText('notes.csv', csvText);
            console.info(`[Viewer] ${currentSceneRows.length} note(s) saved for scene "${sceneMatch}"`);
        }

        document.getElementById('btn-save-notes')?.addEventListener('click', saveAllNotes);

        // 로드 시 CSV + localStorage 에서 현재 씬의 노트를 복원
        async function loadNotes() {
            const sceneMatch = extractSceneMatch(DATA_PATH);
            // Phase 2: storage 모듈이 CSV + user + deletions 를 다 합쳐서 현재 씬의 note 만 돌려줌
            const sceneNotes = await getActiveNotesForScene(sceneMatch, './notes.csv');
            for (const r of sceneNotes) {
                const wp = new THREE.Vector3(
                    parseFloat(r.world_px), parseFloat(r.world_py), parseFloat(r.world_pz)
                );
                // 저장된 노트는 scene root 에 고정 attach (어떤 mesh 에 붙었는지는 영구 보존 불가)
                const a = createAnnotation(scene, wp, r.title || '', r.body || '', false);
                if (a) {
                    a.saved = true;
                    a.$pin.classList.remove('unsaved');
                }
            }
            console.info(`[Viewer] loaded ${sceneNotes.length} note(s) for scene "${sceneMatch}"`);
        }
        // LCC 로드와 독립적으로 가능 — 즉시 호출
        // (setup 모드에선 텔레포트/노트 전부 숨김 — spawn 만 결정하는 단계)
        if (!IS_SETUP) loadNotes();

        // 노트 삭제 시 저장된 것이면 deletions 에 기록 → CSV 출력에서도 제외되도록
        function markNoteDeleted(a) {
            if (!a || !a.saved) return;
            const sceneMatch = extractSceneMatch(DATA_PATH);
            const worldPos = new THREE.Vector3();
            a.anchor.getWorldPosition(worldPos);
            const key = noteRowKey(sceneMatch, worldPos.x, worldPos.y, worldPos.z);
            const dels = loadNoteDeletions();
            if (!dels.includes(key)) { dels.push(key); saveNoteDeletions(dels); }
            // localStorage userNotes 에도 있으면 제거
            const userRows = loadUserNotes().filter(r =>
                !(r.scene_match === sceneMatch &&
                  Math.abs(parseFloat(r.world_px) - worldPos.x) < 0.1 &&
                  Math.abs(parseFloat(r.world_pz) - worldPos.z) < 0.1)
            );
            saveUserNotes(userRows);
        }

        // 모델 삭제 시 해당 모델에 붙어있던 annotation 정리
        // (deleteSelected 가 호출될 때 traverse 이전에 cleanup)
        function cleanupAnnotationsFor(obj) {
            const toRemove = [];
            obj.traverse((c) => {
                for (const a of annotations) {
                    if (a.target === c) toRemove.push(a.id);
                }
            });
            toRemove.forEach(removeAnnotation);
        }

        // 핀 추가 모드 클릭 핸들러: renderer.domElement 의 pointerup 에서 체크.
        // 기존 selection/drag 로직과 분기. (기존 핸들러에서 annotationPlacingMode 체크해서
        // 분기하는 코드는 아래 선택 raycast 로직 수정 시점에 추가.)

        // 매 프레임 핀 위치 갱신 — 본체는 modules/notes/annotation-pins.js 로 이동.
        function updateAnnotationPins() {
            _updateAnnotationPins({ THREE, annotations, camera });
        }

        // ── Mesh collision (raycast ring) ──
        // 카메라 수평 주위로 N개의 레이를 쏴서 PLAYER_RADIUS 안에 메시가 있으면
        // 그 방향 반대로 penetration 만큼 밀어낸다. 가볍고 외부 의존성 없음.
        const COLLISION_RAY_COUNT = 16;
        const _collisionDirs = [];
        for (let i = 0; i < COLLISION_RAY_COUNT; i++) {
            const a = (i / COLLISION_RAY_COUNT) * Math.PI * 2;
            _collisionDirs.push(new THREE.Vector3(Math.cos(a), 0, Math.sin(a)));
        }
        const _meshRaycaster = new THREE.Raycaster();
        _meshRaycaster.far = PLAYER_RADIUS;

        function applyMeshCollision() {
            if (!meshColliderState.enabled) return;
            // 충돌 대상 mesh 수집: (1) 보이는 loadedModels  (2) invisible colliderGroup 전체
            const meshes = [];
            for (const m of loadedModels) {
                if (!m.visible) continue;
                m.object.traverse((c) => {
                    if (c.isMesh) meshes.push(c);
                });
            }
            // colliderGroup 은 group.visible = false 라 raycaster 기본 동작에선
            // 건너뛰지만, 아래 loop 는 자식 mesh 를 직접 배열에 넣으므로 강제 수집됨.
            // (raycaster.intersectObjects 는 각 target 의 .visible 도 체크하므로 임시로 true 로 둘 필요)
            const colliderMeshes = [];
            if (colliderGroup && colliderGroup.children.length > 0) {
                colliderGroup.traverse((c) => {
                    if (c.isMesh) colliderMeshes.push(c);
                });
                // 임시로 mesh 들만 visible 켜서 raycaster 가 찾도록. group 자체는 여전히 invisible.
                for (const c of colliderMeshes) c._origVisible = c.visible, c.visible = true;
                meshes.push(...colliderMeshes);
            }
            if (meshes.length === 0) return;
            _meshRaycaster.far = PLAYER_RADIUS;
            for (const dir of _collisionDirs) {
                _meshRaycaster.set(camera.position, dir);
                const hits = _meshRaycaster.intersectObjects(meshes, false);
                if (hits.length > 0 && hits[0].distance < PLAYER_RADIUS) {
                    const penetration = PLAYER_RADIUS - hits[0].distance;
                    camera.position.x -= dir.x * penetration;
                    camera.position.z -= dir.z * penetration;
                }
            }
            // collider mesh 들의 visible 상태 복원 (colliderGroup.visible=false 이므로 어차피 렌더 안됨)
            for (const c of colliderMeshes) c.visible = c._origVisible ?? true;
        }

        // ── Render loop ──
        const clock = new THREE.Clock();
        const _forward = new THREE.Vector3();
        const _right = new THREE.Vector3();
        const _qYaw = new THREE.Quaternion();
        const _qPitch = new THREE.Quaternion();
        const _yAxis = new THREE.Vector3(0, 1, 0);
        const _xAxis = new THREE.Vector3(1, 0, 0);
        const _euler = new THREE.Euler();
        const RAD2DEG = 180 / Math.PI;

        // Debug HUD는 매 프레임마다 갱신하면 DOM 오버헤드가 커지므로
        // ~10Hz로 throttle.
        let lastHudUpdate = 0;
        function updateDebugHud(now) {
            if (now - lastHudUpdate < 100) return;
            lastHudUpdate = now;
            const p = camera.position;
            $dbgPos.textContent =
                `${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}`;
            _euler.setFromQuaternion(camera.quaternion, 'YXZ');
            // YXZ 순서에서 y=yaw, x=pitch, z=roll
            $dbgYaw.textContent = `${(_euler.y * RAD2DEG).toFixed(1)}°`;
            $dbgPitch.textContent = `${(_euler.x * RAD2DEG).toFixed(1)}°`;
        }

        function render() {
            const delta = clock.getDelta();
            if (controls.enabled) controls.update(delta);

            // Mobile joystick: movement
            if (moveVec.x !== 0 || moveVec.y !== 0) {
                _forward.set(0, 0, -1).applyQuaternion(camera.quaternion);
                _forward.y = 0;
                if (_forward.lengthSq() > 1e-6) _forward.normalize();
                _right.set(1, 0, 0).applyQuaternion(camera.quaternion);
                _right.y = 0;
                if (_right.lengthSq() > 1e-6) _right.normalize();
                const mult =
                    typeof controls.effectiveSpeedMultiplier === 'function'
                        ? controls.effectiveSpeedMultiplier()
                        : 1;
                const speed = controls.movementSpeed * mult * delta;
                camera.position.addScaledVector(_forward, -moveVec.y * speed);
                camera.position.addScaledVector(_right, moveVec.x * speed);
            }

            // Mobile joystick: look
            if (lookVec.x !== 0 || lookVec.y !== 0) {
                _qYaw.setFromAxisAngle(_yAxis, -lookVec.x * delta * LOOK_SPEED);
                camera.quaternion.premultiply(_qYaw);
                _qPitch.setFromAxisAngle(_xAxis, -lookVec.y * delta * LOOK_SPEED);
                camera.quaternion.multiply(_qPitch);
            }

            // Collision (LCC splat)
            if (collisionActive) {
                const res = lccObj.intersectsSphere({
                    center: {
                        x: camera.position.x,
                        y: camera.position.y,
                        z: camera.position.z,
                    },
                    radius: PLAYER_RADIUS,
                });
                if (res && res.hit && res.delta) {
                    camera.position.x += res.delta.x;
                    camera.position.z += res.delta.z;
                }
            }

            // Collision (imported meshes: OBJ / 3DM)
            applyMeshCollision();

            LCCRender.update();
            renderer.render(scene, camera);

            // HTML 주석 핀들을 현재 카메라 시점에 맞춰 스크린 위치 갱신
            updateAnnotationPins();

            // 텔레포트 트리거 proximity 체크 → 하단 버튼 표시/숨김
            updateTeleports();

            updateDebugHud(performance.now());
        }

        // ── Teleports (proximity-triggered scene switch) ──
        // teleports.csv 를 읽어 현재 씬(DATA_PATH 에 scene_match 가 포함된 행)만 활성화.
        // 매 프레임 카메라와 trigger 좌표 사이 3D 거리를 radius 와 비교 → 들어오면 버튼 노출.
        const $teleportBtn = document.getElementById('teleport-btn');
        let activeTeleports = [];      // { trigger: Vector3, radius, destUrl, destPx/Py/Pz, destYaw, destPitch, label }
        let currentTeleport = null;    // 현재 범위 안의 가장 가까운 teleport (버튼에 바인딩)

        // parseTeleportsCSV 는 modules/persistence/csv-utils.js 로 이동.

        // teleport/note 관련 localStorage 헬퍼는 modules/persistence/local-store.js 로 이동.
        // loadDeletions / saveDeletions 는 하위호환을 위해 해당 모듈의 teleport 전용에 매핑.
        const loadDeletions = loadTeleportDeletions;
        const saveDeletions = saveTeleportDeletions;

        async function loadTeleports() {
            try {
                // Phase 2: storage 모듈이 CSV fetch + user merge + deletions 필터 + scene 필터까지 수행
                const rows = await getActiveTeleportsForScene(DATA_PATH, './teleports.csv');
                activeTeleports = rows
                    .map(r => {
                        const trigPy = parseFloat(r.trigger_py);
                        // marker_y: 링 시각적 Y (바닥 높이). 지정 없으면 trigger_py - 1.5 (눈↔바닥 보정).
                        const markerY = (r.marker_y !== undefined && r.marker_y !== '')
                            ? parseFloat(r.marker_y)
                            : trigPy - 1.5;
                        const arrowYawDeg = (r.arrow_yaw !== undefined && r.arrow_yaw !== '')
                            ? parseFloat(r.arrow_yaw) : 0;
                        return {
                            trigger: new THREE.Vector3(
                                parseFloat(r.trigger_px),
                                trigPy,
                                parseFloat(r.trigger_pz),
                            ),
                            markerY,
                            arrowYaw: arrowYawDeg * (Math.PI / 180), // rad
                            radius: parseFloat(r.radius) || 3.0,
                            destUrl: r.dest_url,
                            destPx: r.dest_px, destPy: r.dest_py, destPz: r.dest_pz,
                            destYaw: r.dest_yaw, destPitch: r.dest_pitch,
                            label: r.label || '이동하기',
                            marker: null, // 3D 씬에 놓이는 portal 마커 group
                        };
                    });
                for (const t of activeTeleports) {
                    t.marker = buildTeleportMarker(t);
                    scene.add(t.marker);
                }
                console.info('[Viewer] Teleports active for this scene:', activeTeleports.length, activeTeleports);
            } catch (err) {
                console.warn('[Viewer] teleports.csv 로드 실패 (선택 파일):', err);
                activeTeleports = [];
            }
        }
        if (!IS_SETUP) loadTeleports();

        // Teleport 마커: 바닥에 깔린 빛나는 이중 링 + 중심 디스크.
        // 재질은 additive blending 으로 배경과 상관없이 잘 보이게 함.
        // buildTeleportMarker / buildTeleportHref 는 modules/teleports/teleport-marker.js 로 이동.
        // 기존 호출부 호환을 위한 박막 wrapper (THREE 주입).
        const buildTeleportMarker = (t) => _buildTeleportMarker(THREE, t);
        const buildTeleportHref   = (t) => _buildTeleportHref(t, './viewer.html');

        $teleportBtn.addEventListener('click', () => {
            if (!currentTeleport) return;
            location.href = buildTeleportHref(currentTeleport);
        });

        // ── Teleport edit mode (화살표 회전) ──
        const $teleportEditBtn = document.getElementById('teleport-edit-btn');
        const $teleportRotatePanel = document.getElementById('teleport-rotate-panel');
        const $teleportRotateRange = document.getElementById('teleport-rotate-range');
        const $teleportRotateVal = document.getElementById('teleport-rotate-val');
        const $teleportHeightRange = document.getElementById('teleport-height-range');
        const $teleportHeightVal = document.getElementById('teleport-height-val');
        const $teleportRotateDone = document.getElementById('teleport-rotate-done');
        let editingTeleport = null; // 편집 중인 teleport 객체. null 이면 편집 off

        function enterTeleportEdit(t) {
            if (!requireAdmin('enterTeleportEdit')) return;
            if (!t || !t.marker) return;
            editingTeleport = t;
            // 진입 시점 값 스냅샷 — 변경 여부 판단용
            t._origArrowYaw = t.arrowYaw ?? 0;
            t._origMarkerY = (typeof t.markerY === 'number' ? t.markerY : (t.trigger.y - 1.5));
            // 현재 arrowGroup 의 회전 (rad) → deg 로 슬라이더 초기화
            const arrowGroup = t.marker.userData._anim?.arrowGroup;
            const curDeg = Math.round(((arrowGroup?.rotation.y ?? t.arrowYaw) * 180 / Math.PI));
            let d = ((curDeg + 540) % 360) - 180;
            $teleportRotateRange.value = String(d);
            $teleportRotateVal.textContent = `${d}°`;
            // 높이 슬라이더: 현재 markerY 중심으로 ±4m 범위. step 0.05m.
            const curY = t._origMarkerY;
            $teleportHeightRange.min = (curY - 4).toFixed(2);
            $teleportHeightRange.max = (curY + 4).toFixed(2);
            $teleportHeightRange.step = '0.05';
            $teleportHeightRange.value = curY.toFixed(2);
            $teleportHeightVal.textContent = curY.toFixed(2);
            // UI 토글
            $teleportRotatePanel.classList.remove('hidden');
            $teleportBtn.classList.add('hidden');
            $teleportEditBtn.classList.add('hidden');
            // FPS 컨트롤은 활성 상태 유지 — WASD/R/F 이동, 마우스 드래그 카메라 회전 모두 가능.
            // 슬라이더는 별도 DOM 이라 pointerdown 이 canvas 로 전파되지 않아 자연스럽게 카메라 회전은 막힘.
            // (편집 중 시점을 돌려서 화살표/링을 여러 각도에서 확인하거나, 옆으로 걸어가며 조정 가능)
        }

        // 편집 결과를 localStorage userRows 에 반영 (기존 row 업데이트 or 새 override row 추가).
        // CSV 에 있는 정적 텔레포트도 편집하면 localStorage 쪽으로 복사돼 dedup 로직이 user row 우선.
        function persistTeleportEdit(t) {
            const sceneMatch = extractSceneMatch(DATA_PATH);
            const userRows = loadUserTeleports();
            const idx = userRows.findIndex(r =>
                r.scene_match === sceneMatch &&
                Math.abs(parseFloat(r.trigger_px) - t.trigger.x) < 0.1 &&
                Math.abs(parseFloat(r.trigger_pz) - t.trigger.z) < 0.1
            );
            const row = {
                scene_match: sceneMatch,
                trigger_px: +t.trigger.x.toFixed(3),
                trigger_py: +t.trigger.y.toFixed(3),
                trigger_pz: +t.trigger.z.toFixed(3),
                radius: t.radius ?? 3.0,
                marker_y: +t.markerY.toFixed(2),
                arrow_yaw: +((t.arrowYaw ?? 0) * RAD2DEG).toFixed(2),
                dest_url: t.destUrl ?? '',
                dest_px: t.destPx ?? '',
                dest_py: t.destPy ?? '',
                dest_pz: t.destPz ?? '',
                dest_yaw: t.destYaw ?? '',
                dest_pitch: t.destPitch ?? '',
                label: t.label ?? '이동하기',
            };
            if (idx >= 0) userRows[idx] = row;
            else userRows.push(row);
            saveUserTeleports(userRows);
            return row;
        }

        async function exitTeleportEdit() {
            if (!editingTeleport) return;
            const t = editingTeleport;
            // YAW 반영
            const finalDeg = parseFloat($teleportRotateRange.value) || 0;
            t.arrowYaw = finalDeg * (Math.PI / 180);
            const arrowGroup = t.marker?.userData._anim?.arrowGroup;
            if (arrowGroup) arrowGroup.rotation.y = t.arrowYaw;
            // 높이 반영
            const finalY = parseFloat($teleportHeightRange.value);
            if (!Number.isNaN(finalY)) {
                t.markerY = finalY;
                if (t.marker) t.marker.position.y = finalY;
            }

            // 변경 여부 확인 → 변경된 경우에만 저장 + CSV 다운로드
            const yawChanged = Math.abs(t.arrowYaw - (t._origArrowYaw ?? 0)) > 1e-5;
            const heightChanged = Math.abs(t.markerY - (t._origMarkerY ?? 0)) > 1e-3;
            if (yawChanged || heightChanged) {
                const saved = persistTeleportEdit(t);
                console.info('[Viewer] teleport edit persisted:', saved);
                try {
                    const csvText = await buildUpdatedTeleportsCsv();
                    console.info('─── teleports.csv after edit (덮어쓰기용) ───');
                    console.info(csvText);
                    downloadText('teleports.csv', csvText);
                } catch (e) { console.warn('[Viewer] csv build failed:', e); }
            } else {
                console.info('[Viewer] edit DONE — no change');
            }

            editingTeleport = null;
            $teleportRotatePanel.classList.add('hidden');
            if (controls) controls.enabled = true;
        }

        $teleportEditBtn.addEventListener('click', () => {
            if (!requireAdmin('teleportEditBtn')) return;
            if (currentTeleport) enterTeleportEdit(currentTeleport);
        });

        $teleportRotateRange.addEventListener('input', (e) => {
            if (!editingTeleport) return;
            const deg = parseFloat(e.target.value);
            $teleportRotateVal.textContent = `${deg}°`;
            const arrowGroup = editingTeleport.marker?.userData._anim?.arrowGroup;
            if (arrowGroup) arrowGroup.rotation.y = deg * (Math.PI / 180);
        });

        $teleportHeightRange.addEventListener('input', (e) => {
            if (!editingTeleport) return;
            const y = parseFloat(e.target.value);
            $teleportHeightVal.textContent = y.toFixed(2);
            if (editingTeleport.marker) editingTeleport.marker.position.y = y;
        });

        $teleportRotateDone.addEventListener('click', exitTeleportEdit);

        // 편집 중인 텔레포트를 씬/activeTeleports 에서 제거하는 헬퍼
        function removeTeleportFromScene(t) {
            if (!t) return;
            if (t.marker && t.marker.parent) scene.remove(t.marker);
            const idx = activeTeleports.indexOf(t);
            if (idx >= 0) activeTeleports.splice(idx, 1);
        }

        // 현재 편집 중인 텔레포트에 대응하는 rowKey 한 쌍 계산 (이쪽 / 반대쪽)
        function collectTeleportPairKeys(t) {
            const keys = [];
            const srcMatch = extractSceneMatch(DATA_PATH);
            keys.push(teleportRowKey(srcMatch, t.trigger.x, t.trigger.z));
            if (t.destUrl && t.destPx !== undefined && t.destPz !== undefined) {
                const destMatch = extractSceneMatch(t.destUrl);
                keys.push(teleportRowKey(destMatch, t.destPx, t.destPz));
            }
            return keys;
        }

        // 🗑 삭제 버튼
        const $tpDelete = document.getElementById('teleport-delete');
        $tpDelete?.addEventListener('click', async () => {
            if (!editingTeleport) return;
            if (!confirm('이 텔레포트를 삭제합니다.\n연결된 반대 방향도 함께 제거됩니다. 계속할까요?')) return;
            const t = editingTeleport;
            const pairKeys = collectTeleportPairKeys(t);

            // localStorage user rows 에서 제거 (해당 키들)
            const userRows = loadUserTeleports();
            const filteredUser = userRows.filter(r => {
                const k = teleportRowKey(r.scene_match, r.trigger_px, r.trigger_pz);
                return !pairKeys.includes(k);
            });
            saveUserTeleports(filteredUser);
            // 정적 CSV 에도 있을 수 있으니 deletions 에 기록 (CSV 에서 제외시킴)
            const deletions = loadDeletions();
            for (const k of pairKeys) if (!deletions.includes(k)) deletions.push(k);
            saveDeletions(deletions);

            // 씬에서 즉시 제거 (현재 씬의 마커만 — 반대쪽은 그 씬에 들어가야 지워짐)
            removeTeleportFromScene(t);

            // CSV 재생성 + 다운로드
            const csvText = await buildUpdatedTeleportsCsv();
            console.info('─── teleports.csv after delete (덮어쓰기용) ───');
            console.info(csvText);
            downloadText('teleports.csv', csvText);

            // 편집 UI 닫기
            editingTeleport = null;
            $teleportRotatePanel.classList.add('hidden');
            if (controls) controls.enabled = true;
            alert('텔레포트 삭제 완료.\n업데이트된 teleports.csv 가 다운로드 됐어요.');
        });

        // 🔗 씬 변경 버튼 — 이 텔레포트의 출발점은 유지하고 도착점(씬+위치)만 교체
        const $tpChangeScene = document.getElementById('teleport-change-scene');
        $tpChangeScene?.addEventListener('click', async () => {
            if (!editingTeleport) return;
            const t = editingTeleport;
            // 현재 화살표 yaw (편집 중 변경됐으면 반영)
            const arrowGroup = t.marker?.userData._anim?.arrowGroup;
            const curArrowRad = arrowGroup?.rotation.y ?? t.arrowYaw ?? 0;
            const curArrowDeg = +(curArrowRad * RAD2DEG).toFixed(2);

            // pending 상태 세팅 — mode=replace
            const oldKeys = collectTeleportPairKeys(t);
            const pending = {
                step: 'picking_scene',
                mode: 'replace',
                source: {
                    url: DATA_PATH,
                    px: +t.trigger.x.toFixed(3),
                    py: +t.trigger.y.toFixed(3),
                    pz: +t.trigger.z.toFixed(3),
                    yaw: curArrowDeg,
                    pitch: 0,
                },
                srcSceneName: document.title || '출발지',
                oldKeys,
                // 기존 arrow_yaw / marker_y 를 그대로 이어쓸 수 있게 보존
                sourceArrowYawDeg: curArrowDeg,
                sourceMarkerY: (typeof t.markerY === 'number' ? t.markerY : (t.trigger.y - 1.5)),
            };
            sessionStorage.setItem(TP_SS_KEY, JSON.stringify(pending));

            // 편집 UI 닫고 씬 선택 모달 열기
            editingTeleport = null;
            $teleportRotatePanel.classList.add('hidden');
            if (controls) controls.enabled = true;
            tpState = 'picking_scene';
            await openScenePicker();
        });

        // ══════════════════════════════════════════════════════════════════
        // Teleport creation wizard (+ TELEPORT 버튼)
        // 1) 현재 위치에서 "여기로 하기" → source pose 저장
        // 2) 씬 목록 모달 → 목적 씬 선택 → 해당 씬으로 navigate (pending 상태를 sessionStorage 로 가지고 감)
        // 3) 목적 씬에서 자동으로 step 2 UI 진입 → "여기로 하기" → dest pose 저장
        // 4) 쌍방 텔레포트 2행 생성 → localStorage 저장 + CSV 자동 다운로드
        // ══════════════════════════════════════════════════════════════════
        const TP_SS_KEY = 'voidbox.pendingTeleport.v1';
        const $btnTpCreate = document.getElementById('btn-teleport-create');
        const $tpPlacePanel = document.getElementById('tp-place-panel');
        const $tpStepLabel = document.getElementById('tp-step-label');
        const $tpHereBtn = document.getElementById('tp-here-btn');
        const $tpCancelBtn = document.getElementById('tp-cancel-btn');
        const $tpSceneModal = document.getElementById('tp-scene-modal');
        const $tpSceneListIndoor = document.getElementById('tp-scene-list-indoor');
        const $tpSceneListOutdoor = document.getElementById('tp-scene-list-outdoor');
        const $tpSceneCancel = document.getElementById('tp-scene-cancel');

        let tpState = 'idle'; // idle | placing_source | picking_scene | placing_dest

        // extractSceneMatch 는 modules/utils/pose.js 에서 import.
        // getCameraPose 는 _getCameraPose(THREE, camera) 로 노출 → 이 파일 스코프에서
        // 기존 호출부가 인자 없이 getCameraPose() 로 쓰던 것 유지하려고 박막 wrapper.
        function getCameraPose() { return _getCameraPose(THREE, camera); }

        function showTpPlacePanel(step) {
            $tpStepLabel.textContent = step === 1 ? 'STEP 1 / 2  (출발점)' : 'STEP 2 / 2  (도착점)';
            $tpPlacePanel.classList.remove('hidden');
        }
        function hideTpPlacePanel() { $tpPlacePanel.classList.add('hidden'); }
        function hideTpSceneModal() { $tpSceneModal.classList.remove('open'); }

        // 씬 목록 불러오기 (실내 + 실외 합침)
        async function loadAllScenes() {
            const out = [];
            for (const [path, group] of [['./scenes.csv', '실내'], ['./scenes-outdoor.csv', '실외']]) {
                try {
                    const res = await fetch(path);
                    if (!res.ok) continue;
                    const txt = await res.text();
                    const lines = txt.trim().split(/\r?\n/);
                    const header = lines[0].split(',').map(h => h.trim());
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i]; if (!line.trim()) continue;
                        const parts = line.split(',').map(p => p.trim());
                        const row = { _group: group };
                        header.forEach((k, j) => { if (parts[j] !== undefined && parts[j] !== '') row[k] = parts[j]; });
                        if (row.name && row.url) out.push(row);
                    }
                } catch (e) { console.warn('[Viewer] scene list load fail:', path, e); }
            }
            return out;
        }

        async function openScenePicker() {
            const loading = '<div style="padding:12px;color:#888;">불러오는 중…</div>';
            $tpSceneListIndoor.innerHTML = loading;
            $tpSceneListOutdoor.innerHTML = loading;
            $tpSceneModal.classList.add('open');
            const scenes = await loadAllScenes();
            // 현재 씬 제외
            const filtered = scenes.filter(s => !DATA_PATH.includes(extractSceneMatch(s.url)));
            const indoor = filtered.filter(s => s._group === '실내');
            const outdoor = filtered.filter(s => s._group === '실외');

            function renderCol($col, rows, emptyMsg) {
                if (rows.length === 0) {
                    $col.innerHTML = `<div style="padding:12px;color:#888;font-size:12px;">${emptyMsg}</div>`;
                    return;
                }
                $col.innerHTML = '';
                for (const s of rows) {
                    const btn = document.createElement('div');
                    btn.className = 'tp-scene-item';
                    btn.innerHTML = `<span>${s.name}</span>`;
                    btn.addEventListener('click', () => selectDestScene(s));
                    $col.appendChild(btn);
                }
            }
            renderCol($tpSceneListIndoor, indoor, '실내 씬이 없습니다');
            renderCol($tpSceneListOutdoor, outdoor, '실외 씬이 없습니다');
        }

        function selectDestScene(sceneRow) {
            // 현재 pending 의 source 는 이미 저장돼 있어야 함
            const pending = JSON.parse(sessionStorage.getItem(TP_SS_KEY) || 'null');
            if (!pending || !pending.source) {
                console.warn('[TP] pending source missing');
                return;
            }
            pending.step = 'placing_dest';
            pending.destUrl = sceneRow.url;
            pending.destSceneName = sceneRow.name;
            sessionStorage.setItem(TP_SS_KEY, JSON.stringify(pending));
            // 해당 씬으로 이동 — 씬 기본 spawn 으로 들어감, 이후 사용자가 원하는 위치로 움직인 뒤 "여기로 하기"
            const qs = new URLSearchParams();
            qs.set('data', sceneRow.url);
            ['px', 'py', 'pz', 'yaw', 'pitch', 'mesh'].forEach(k => { if (sceneRow[k]) qs.set(k, sceneRow[k]); });
            location.href = `./viewer.html?${qs.toString()}`;
        }

        function cancelTpCreate() {
            sessionStorage.removeItem(TP_SS_KEY);
            hideTpPlacePanel();
            hideTpSceneModal();
            tpState = 'idle';
            if (controls) controls.enabled = true;
            console.info('[TP] creation cancelled');
        }

        function enterPlacingSource() {
            tpState = 'placing_source';
            sessionStorage.removeItem(TP_SS_KEY);
            showTpPlacePanel(1);
        }

        function enterPlacingDest() {
            tpState = 'placing_dest';
            showTpPlacePanel(2);
        }

        // buildUpdatedTeleportsCsv / downloadText 는 modules/*/storage.js 및 csv-utils.js 로 이동.

        // 최종 확정: 쌍방 텔레포트 2행 생성 → localStorage 저장 + CSV 다운로드 + console dump
        async function finalizeTeleport() {
            const pending = JSON.parse(sessionStorage.getItem(TP_SS_KEY) || 'null');
            if (!pending || !pending.source) {
                console.warn('[TP] finalize: pending missing');
                cancelTpCreate();
                return;
            }
            const dest = getCameraPose();
            const src = pending.source;
            const srcUrl = src.url;
            const destUrl = DATA_PATH; // 현재 열려있는 씬 = 목적 씬
            const srcMatch = extractSceneMatch(srcUrl);
            const destMatch = extractSceneMatch(destUrl);
            const destSceneName = pending.destSceneName || '목적지';
            const srcSceneName = pending.srcSceneName || '출발지';
            // 2 행 생성 (source → dest, dest → source)
            const rowAB = {
                scene_match: srcMatch,
                trigger_px: src.px, trigger_py: src.py, trigger_pz: src.pz,
                radius: '3.0',
                marker_y: (src.py - 1.5).toFixed(2),
                arrow_yaw: src.yaw,
                dest_url: destUrl,
                dest_px: dest.px, dest_py: dest.py, dest_pz: dest.pz,
                dest_yaw: dest.yaw, dest_pitch: dest.pitch,
                label: `${destSceneName} 으로 이동하기`,
            };
            const rowBA = {
                scene_match: destMatch,
                trigger_px: dest.px, trigger_py: dest.py, trigger_pz: dest.pz,
                radius: '3.0',
                marker_y: (dest.py - 1.5).toFixed(2),
                arrow_yaw: dest.yaw,
                dest_url: srcUrl,
                dest_px: src.px, dest_py: src.py, dest_pz: src.pz,
                dest_yaw: src.yaw, dest_pitch: src.pitch,
                label: `${srcSceneName} 으로 이동하기`,
            };
            // replace 모드면 기존 쌍 제거
            if (pending.mode === 'replace' && Array.isArray(pending.oldKeys)) {
                const userRowsBefore = loadUserTeleports();
                const filteredUser = userRowsBefore.filter(r => {
                    const k = teleportRowKey(r.scene_match, r.trigger_px, r.trigger_pz);
                    return !pending.oldKeys.includes(k);
                });
                saveUserTeleports(filteredUser);
                const deletions = loadDeletions();
                for (const k of pending.oldKeys) if (!deletions.includes(k)) deletions.push(k);
                saveDeletions(deletions);
                // 소스 씬의 기존 마커도 씬에서 지움 — 하지만 우리는 지금 '도착' 씬에 있음.
                // 소스로 다시 돌아갔을 때 loadTeleports 가 deletions 반영해서 자동 제외됨.
                // 현재 씬(=새 도착) 에서 반대 방향 마커는 아래에서 push.
                console.info('[TP] replace mode: removed old keys', pending.oldKeys);
            }

            // pending 이 replace 이고 source 가 보존한 arrow_yaw / marker_y 가 있으면 덮어쓰기
            if (pending.mode === 'replace') {
                if (pending.sourceArrowYawDeg !== undefined) rowAB.arrow_yaw = pending.sourceArrowYawDeg;
                if (pending.sourceMarkerY !== undefined) rowAB.marker_y = (+pending.sourceMarkerY).toFixed(2);
            }

            // localStorage 에 누적 저장
            const userRows = loadUserTeleports();
            userRows.push(rowAB, rowBA);
            saveUserTeleports(userRows);
            console.info('[TP] saved teleport pair (mode=%s):', pending.mode || 'create', rowAB, rowBA);

            // CSV 생성/다운로드
            const csvText = await buildUpdatedTeleportsCsv();
            console.info('─── Updated teleports.csv (복사해서 프로젝트의 teleports.csv 에 저장) ───');
            console.info(csvText);
            console.info('──────────────────────────────────────────────────────────────────');
            downloadText('teleports.csv', csvText);

            // 정리
            sessionStorage.removeItem(TP_SS_KEY);
            hideTpPlacePanel();
            tpState = 'idle';

            // replace 모드면 현재(도착) 씬에 남아있을 수 있는 "옛 반대방향" 마커 제거
            if (pending.mode === 'replace' && Array.isArray(pending.oldKeys)) {
                const curSceneMatch = extractSceneMatch(DATA_PATH);
                for (let i = activeTeleports.length - 1; i >= 0; i--) {
                    const t = activeTeleports[i];
                    const k = teleportRowKey(curSceneMatch, t.trigger.x, t.trigger.z);
                    if (pending.oldKeys.includes(k)) {
                        if (t.marker && t.marker.parent) scene.remove(t.marker);
                        activeTeleports.splice(i, 1);
                    }
                }
            }

            // 새 텔레포트가 현재 씬에도 하나 붙었으니 마커 즉시 추가
            const destTeleportData = {
                trigger: new THREE.Vector3(dest.px, dest.py, dest.pz),
                markerY: dest.py - 1.5,
                arrowYaw: dest.yaw * (Math.PI / 180),
                radius: 3.0,
                destUrl: srcUrl,
                destPx: src.px, destPy: src.py, destPz: src.pz,
                destYaw: src.yaw, destPitch: src.pitch,
                label: rowBA.label,
                marker: null,
            };
            destTeleportData.marker = buildTeleportMarker(destTeleportData);
            scene.add(destTeleportData.marker);
            activeTeleports.push(destTeleportData);

            const msg = pending.mode === 'replace'
                ? '텔레포트 연결이 변경되었습니다.\n\n업데이트된 teleports.csv 가 다운로드 됐어요.'
                : '쌍방 텔레포트 생성 완료!\n\n업데이트된 teleports.csv 가 다운로드 됐어요.\n프로젝트의 teleports.csv 에 덮어쓰면 영구 반영됩니다.';
            alert(msg);
        }

        // + TELEPORT 버튼 클릭
        $btnTpCreate?.addEventListener('click', () => {
            if (!requireAdmin('teleportCreate')) return;
            if (tpState !== 'idle') { cancelTpCreate(); return; }
            enterPlacingSource();
        });

        // "여기로 하기" 클릭
        $tpHereBtn?.addEventListener('click', async () => {
            if (tpState === 'placing_source') {
                const pose = getCameraPose();
                const pending = {
                    step: 'picking_scene',
                    source: { ...pose, url: DATA_PATH },
                    srcSceneName: document.title || '출발지',
                };
                sessionStorage.setItem(TP_SS_KEY, JSON.stringify(pending));
                hideTpPlacePanel();
                tpState = 'picking_scene';
                await openScenePicker();
            } else if (tpState === 'placing_dest') {
                await finalizeTeleport();
            }
        });

        // "취소" 클릭
        $tpCancelBtn?.addEventListener('click', cancelTpCreate);
        $tpSceneCancel?.addEventListener('click', () => {
            hideTpSceneModal();
            // 취소해도 pending.source 는 남겨두고 다시 place panel 보여줘도 되는데,
            // 단순성 위해 완전 취소.
            cancelTpCreate();
        });

        // 페이지 로드 시: sessionStorage 의 pending 검사 → step=placing_dest 면 자동 진입
        (function resumePendingTeleport() {
            const pending = JSON.parse(sessionStorage.getItem(TP_SS_KEY) || 'null');
            if (!pending) return;
            if (pending.step === 'placing_dest' && pending.destUrl && DATA_PATH === pending.destUrl) {
                console.info('[TP] resume: placing_dest in', pending.destUrl);
                enterPlacingDest();
            } else if (pending.step === 'picking_scene') {
                // 사용자가 씬 선택 모달에서 브라우저 뒤로가기 등으로 도로 돌아온 경우 → 모달 다시 열기
                console.info('[TP] resume: reopening scene picker');
                enterPlacingSource(); // 일단 STEP 1 로 되돌림 (안전)
                // 혹은 바로 openScenePicker() 로 재진입하려면 source 가 유지돼 있으므로 가능
            }
        })();

        const _tpCamPos = new THREE.Vector3();
        function updateTeleports() {
            if (activeTeleports.length === 0) {
                if (!$teleportBtn.classList.contains('hidden')) {
                    $teleportBtn.classList.add('hidden');
                }
                currentTeleport = null;
                return;
            }
            camera.getWorldPosition(_tpCamPos);
            const now = performance.now() * 0.001; // 초 단위
            // XZ 평면에서만 거리 측정 (Y 는 무시 → 카메라 높이에 상관없이 트리거됨)
            const xzDist = (t) => {
                const dx = _tpCamPos.x - t.trigger.x;
                const dz = _tpCamPos.z - t.trigger.z;
                return Math.hypot(dx, dz);
            };
            // 가장 가까운 in-range 트리거 선택 (여러 개 동시 겹칠 경우 대비)
            let best = null;
            let bestDist = Infinity;
            for (const t of activeTeleports) {
                const d = xzDist(t);
                if (d <= t.radius && d < bestDist) {
                    best = t;
                    bestDist = d;
                }
            }
            // 각 마커 애니메이션 (회전 + 스케일 pulse + 근접 시 글로우 강화)
            for (const t of activeTeleports) {
                if (!t.marker) continue;
                const a = t.marker.userData._anim;
                if (!a) continue;
                a.outerRing.rotation.z = now * 0.6;
                a.innerRing.rotation.z = -now * 1.1;
                const pulse = 1 + Math.sin(now * 2.2) * 0.06;
                a.outerRing.scale.setScalar(pulse);
                a.innerRing.scale.setScalar(2 - pulse);

                // 카메라 거리별 밝기: radius 밖에선 기본값, 안으로 들어갈수록 밝아짐 (XZ 기준)
                const d = xzDist(t);
                const near = Math.max(0, Math.min(1, 1 - d / (t.radius * 1.6)));
                a.outerRing.material.opacity = 0.6 + near * 0.4;
                a.innerRing.material.opacity = 0.45 + near * 0.45;
                a.disc.material.opacity = 0.12 + near * 0.25;
                a.pillar.material.opacity = 0.06 + near * 0.18;
                if (a.arrow) a.arrow.material.opacity = 0.5 + near * 0.4;
            }

            if (best) {
                if (currentTeleport !== best) {
                    currentTeleport = best;
                    $teleportBtn.textContent = best.label;
                }
                // 편집 중이면 텔레포트/에디트 버튼 둘 다 숨긴 채 유지 (패널만 보임)
                if (!editingTeleport) {
                    $teleportBtn.classList.remove('hidden');
                    $teleportEditBtn.classList.remove('hidden');
                }
            } else {
                $teleportBtn.classList.add('hidden');
                $teleportEditBtn.classList.add('hidden');
                currentTeleport = null;
                // 편집 중인 상태에서 범위 벗어나도 편집 패널은 그대로 둠 (사용자가 DONE 칠 때까지)
            }
        }

        // ── Setup mode: 새 씬의 spawn 위치 확정 ───────────────────────────
        // 확인 → scenes CSV 업데이트 + 다운로드 → index.html 로 복귀.
        // 취소 → localStorage 에 방금 추가된 씬 제거 → index.html 로 복귀.
        if (IS_SETUP) {
            const $setupConfirm = document.getElementById('setup-confirm');
            const $setupCancel  = document.getElementById('setup-cancel');

            $setupConfirm?.addEventListener('click', async () => {
                const pose = getCameraPose(); // { px, py, pz, yaw, pitch }
                const ok = updateSceneSpawn(SETUP_GROUP, DATA_PATH, pose);
                if (!ok) {
                    alert('저장 실패: 이 씬의 사용자 레코드를 찾을 수 없습니다.\n(index.html 에서 다시 + 새로운 공간 추가 로 시작해 주세요)');
                    return;
                }
                console.info(`[Viewer] scene spawn saved for ${DATA_PATH}:`, pose);
                try {
                    const csvText = await buildUpdatedScenesCsv(SETUP_GROUP);
                    const filename = SETUP_GROUP === 'outdoor' ? 'scenes-outdoor.csv' : 'scenes.csv';
                    console.info(`─── ${filename} (덮어쓰기용) ───`);
                    console.info(csvText);
                    downloadText(filename, csvText);
                } catch (e) {
                    console.warn('[Viewer] scenes CSV build failed:', e);
                }
                alert(`새 씬 등록 완료!\n\nSpawn: (${pose.px}, ${pose.py}, ${pose.pz}) yaw ${pose.yaw}° pitch ${pose.pitch}°\n\n업데이트된 ${SETUP_GROUP === 'outdoor' ? 'scenes-outdoor.csv' : 'scenes.csv'} 가 다운로드 됐어요.\n프로젝트 폴더에 덮어쓰면 영구 반영됩니다.`);
                location.href = './';
            });

            $setupCancel?.addEventListener('click', () => {
                // 이 씬에 해당하는 user scene 레코드 제거 (index.html 에서 입력한 것)
                removeUserScene(SETUP_GROUP, DATA_PATH);
                console.info(`[Viewer] setup cancelled — removed user scene: ${DATA_PATH}`);
                location.href = './';
            });
        }

        renderer.setAnimationLoop(render);
    </script>
</body>

</html>
