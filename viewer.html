<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LCC Viewer</title>
    <style>
        :root {
            color-scheme: dark;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Loading overlay ── */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.7);
            transition: opacity 400ms ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-eyebrow {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        #loading-percent {
            font-size: 24px;
            font-variant-numeric: tabular-nums;
            color: #fff;
        }

        #loading-track {
            width: 160px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
        }

        #loading-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 200ms ease;
        }

        #error-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
        }

        /* ── Top-right button column ── */
        .top-buttons {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .ctrl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 11px;
            letter-spacing: 0.22em;
            padding: 6px 12px;
            cursor: pointer;
            transition: background 120ms, color 120ms;
            backdrop-filter: blur(4px);
        }

        .ctrl-btn:hover {
            background: #fff;
            color: #000;
        }

        /* ── Debug HUD ── */
        #debugHud {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.85);
            font: 500 11px/1.5 "SF Mono", "Consolas", "Menlo", monospace;
            letter-spacing: 0.02em;
            min-width: 180px;
        }

        .debug-row {
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 8px;
        }

        .debug-key {
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .debug-val {
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        /* ── Control guide ── */
        #controlGuide {
            position: fixed;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            z-index: 30;
            width: min(84vw, 44rem);
            max-width: calc(100vw - 28px);
            color: rgba(255, 255, 255, 0.95);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
                rgba(12, 16, 22, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 20px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(14px);
            padding: 12px 14px;
            transition: opacity 250ms ease, transform 300ms ease;
        }

        #controlGuide.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        #controlGuideHint {
            margin-top: 10px;
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        #controlGuideHeader {
            text-align: center;
        }

        #controlGuideToggleLabel {
            color: rgba(255, 255, 255, 0.65);
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        #controlGuideBody {
            margin-top: 10px;
        }

        .guide-grid {
            display: grid;
            gap: 10px;
        }

        .guide-grid.desktop {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .guide-grid.mobile {
            grid-template-columns: 1fr 1fr;
        }

        .guide-item {
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            padding: 12px;
            text-align: center;
        }

        .guide-item-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .guide-item-body {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 56px;
        }

        .guide-item-copy {
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            line-height: 1.3;
        }

        .keycap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .key-stack {
            display: grid;
            gap: 6px;
        }

        .key-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .slash {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
        }

        .chip {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.88);
            font-size: 13px;
        }

        .touch-disc {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.05);
        }

        .touch-disc::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 18px;
            height: 18px;
            transform: translate(-50%, -50%);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.22);
        }

        .slider-icon {
            width: 8px;
            height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            position: relative;
            background: rgba(255, 255, 255, 0.04);
        }

        .slider-icon::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 25%;
            width: 14px;
            height: 14px;
            transform: translate(-50%, -50%);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 640px) {
            #controlGuide {
                width: auto;
                left: 12px;
                right: 12px;
                bottom: calc(128px + 36px);
                /* 조이스틱과 겹치지 않도록 위쪽으로 */
                transform: none;
                padding: 8px;
            }

            #controlGuide.hidden {
                transform: translateY(20px);
            }

            .guide-grid.mobile {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }

            .guide-grid.mobile .guide-item {
                padding: 8px 6px;
            }

            .guide-grid.mobile .guide-item-body {
                min-height: 32px;
                margin-top: 6px;
            }

            .guide-grid.mobile .guide-item-copy {
                margin-top: 6px;
                font-size: 11px;
            }

            .guide-grid.mobile .touch-disc {
                width: 28px;
                height: 28px;
            }

            .guide-grid.mobile .touch-disc::after {
                width: 12px;
                height: 12px;
            }

            .guide-grid.mobile .slider-icon {
                height: 32px;
                width: 6px;
            }

            #controlGuideHint {
                margin-top: 6px;
                font-size: 9px;
            }
        }

        /* ── Height slider ── */
        .height-slider {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            touch-action: none;
            user-select: none;
        }

        .height-slider-label {
            font-size: 9px;
            letter-spacing: 0.22em;
            color: rgba(255, 255, 255, 0.6);
        }

        .height-slider-track {
            position: relative;
            width: 32px;
            height: 160px;
            cursor: ns-resize;
        }

        .height-slider-rail {
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.25);
        }

        .height-slider-baseline {
            position: absolute;
            left: 50%;
            width: 12px;
            height: 1px;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.4);
        }

        .height-slider-knob {
            position: absolute;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, 50%);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        /* ── Joystick ── */
        .joystick {
            position: fixed;
            bottom: 24px;
            z-index: 30;
            width: 128px;
            height: 128px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            touch-action: none;
            user-select: none;
        }

        .joystick.left {
            left: 24px;
        }

        .joystick.right {
            right: 24px;
        }

        .joystick-crosshair-h,
        .joystick-crosshair-v {
            position: absolute;
            left: 50%;
            top: 50%;
            background: rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        .joystick-crosshair-h {
            width: 24px;
            height: 1px;
            transform: translate(-50%, -50%);
        }

        .joystick-crosshair-v {
            width: 1px;
            height: 24px;
            transform: translate(-50%, -50%);
        }

        .joystick-knob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .joystick.active .joystick-knob {
            transition: none;
        }

        .joystick-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            letter-spacing: 0.22em;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }

        /* ── Drop overlay ── */
        #drop-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            pointer-events: none;
        }

        #drop-overlay.active {
            display: flex;
        }

        .drop-card {
            padding: 28px 40px;
            border: 2px dashed rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            color: #fff;
            text-align: center;
        }

        .drop-card-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        .drop-card-sub {
            margin-top: 8px;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
        }

        /* ── Model list panel ── */
        #model-panel {
            position: fixed;
            left: 16px;
            bottom: 16px;
            z-index: 30;
            min-width: 200px;
            max-width: 280px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.85);
            font: 500 11px/1.4 "SF Mono", "Consolas", "Menlo", monospace;
            display: none;
        }

        #model-panel.has-models {
            display: block;
        }

        .model-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .model-panel-title {
            font-size: 10px;
            letter-spacing: 0.22em;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .mini-toggle {
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: transparent;
            color: rgba(255, 255, 255, 0.55);
            border-radius: 4px;
            padding: 3px 7px;
            font: 500 9px/1 "SF Mono", "Consolas", "Menlo", monospace;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 120ms, color 120ms, border-color 120ms;
            flex-shrink: 0;
        }

        .mini-toggle:hover {
            color: rgba(255, 255, 255, 0.85);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .mini-toggle[data-on="true"] {
            background: rgba(120, 200, 255, 0.22);
            border-color: rgba(120, 200, 255, 0.6);
            color: #fff;
        }

        .model-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .model-row-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            transition: opacity 120ms;
        }

        .model-row[data-visible="false"] .model-row-name {
            opacity: 0.35;
            text-decoration: line-through;
        }

        .model-row[data-selected="true"] {
            background: rgba(120, 200, 255, 0.12);
            margin: 0 -6px;
            padding: 4px 6px;
            border-radius: 4px;
        }

        /* ── Transform (gizmo) panel ── */
        #transform-panel {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 31;
            display: none;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.9);
            font: 500 10px/1 "SF Mono", "Consolas", "Menlo", monospace;
            letter-spacing: 0.15em;
        }

        #transform-panel.active {
            display: inline-flex;
        }

        .tx-label {
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-right: 4px;
        }

        .tx-name {
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #fff;
            font-size: 11px;
            padding-right: 8px;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            margin-right: 2px;
        }

        .tx-btn {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: rgba(255, 255, 255, 0.65);
            border-radius: 4px;
            padding: 5px 9px;
            font: inherit;
            cursor: pointer;
            transition: background 120ms, color 120ms, border-color 120ms;
        }

        .tx-btn:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .tx-btn[data-on="true"] {
            background: rgba(120, 200, 255, 0.22);
            border-color: rgba(120, 200, 255, 0.6);
            color: #fff;
        }

        .tx-btn.danger:hover {
            background: rgba(255, 100, 100, 0.22);
            border-color: rgba(255, 100, 100, 0.55);
            color: #fff;
        }

        /* ── Annotation pins (3D 공간에 붙는 + 버튼) ── */
        .anno-pin {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 28;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.85);
            background: rgba(30, 120, 200, 0.9);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            /* transform 에는 transition 주지 않기 — 카메라 움직임마다 lag 보간되면 핀이 따라다니는 것처럼 보임 */
            transition: background 120ms, box-shadow 120ms, border-color 120ms;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
            will-change: transform;
        }

        .anno-pin:hover {
            background: rgba(60, 160, 240, 1);
            box-shadow: 0 6px 22px rgba(60, 160, 240, 0.5);
        }

        .anno-pin.hidden {
            display: none;
        }

        /* ── Annotation speech bubble ── */
        .anno-bubble {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 29;
            max-width: 260px;
            min-width: 140px;
            padding: 10px 12px 12px;
            border-radius: 10px;
            background: rgba(20, 20, 20, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            font-size: 12px;
            line-height: 1.45;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
            pointer-events: auto;
            will-change: transform;
        }

        .anno-bubble.hidden {
            display: none;
        }

        .anno-bubble::before {
            /* 핀을 가리키는 꼬리 (좌측) */
            content: '';
            position: absolute;
            left: -7px;
            top: 14px;
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-right: 7px solid rgba(20, 20, 20, 0.94);
        }

        .anno-bubble-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            word-break: break-word;
        }

        .anno-bubble-body {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.82);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 160px;
            overflow-y: auto;
        }

        .anno-bubble-body:empty {
            display: none;
        }

        .anno-bubble-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .anno-bubble-btn {
            padding: 4px 8px;
            font: 500 10px/1 inherit;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: transparent;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            transition: background 120ms, border-color 120ms, color 120ms;
        }

        .anno-bubble-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        /* ── Teleport prompt button (proximity trigger) ── */
        .teleport-btn {
            position: fixed;
            left: 50%;
            bottom: 32px;
            transform: translateX(-50%);
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 999px;
            border: 1px solid rgba(120, 200, 255, 0.6);
            background: rgba(30, 120, 200, 0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            font: 600 13px/1 inherit;
            letter-spacing: 0.08em;
            cursor: pointer;
            box-shadow: 0 10px 32px rgba(30, 120, 200, 0.45);
            transition: transform 180ms, background 180ms, box-shadow 180ms, opacity 180ms;
        }

        .teleport-btn:hover {
            background: rgba(60, 160, 240, 1);
            box-shadow: 0 14px 40px rgba(60, 160, 240, 0.6);
            transform: translateX(-50%) translateY(-2px);
        }

        .teleport-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(12px);
        }

        .teleport-btn::before {
            content: '⇆';
            font-size: 16px;
            line-height: 1;
        }

        /* 핀 추가 모드일 때 커서 표시 */
        body.anno-placing canvas {
            cursor: crosshair !important;
        }

        body.anno-placing .anno-pin {
            opacity: 0.5;
            pointer-events: none;
        }

        /* ── Annotation modal ── */
        .anno-modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 120;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
        }

        .anno-modal-backdrop.open {
            display: flex;
        }

        .anno-modal {
            width: 90%;
            max-width: 420px;
            padding: 24px;
