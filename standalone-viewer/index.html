<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Standalone SuperSplat Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="viewer-shell">
      <div class="viewer-frame" id="viewerFrame">
        <div class="page-nav">
          <a class="page-nav-link" href="../">See Another Room</a>
        </div>
        <iframe
          id="viewerIframe"
          title="Standalone SuperSplat Viewer"
          allow="fullscreen; xr-spatial-tracking"
          tabindex="-1"
        ></iframe>

        <div class="loading-overlay" id="loadingOverlay" aria-live="polite">
          <div class="loading-card">
            <div class="loading-spinner"></div>
            <div class="loading-dots" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>

        <button
          id="activationOverlay"
          class="activation-overlay hidden"
          type="button"
          aria-label="Activate 3D viewer controls"
        >
          <div class="guide-card">
            <p class="guide-title">3D viewer controls</p>
            <p class="guide-subtitle">Activate the viewer to move through the scene</p>
            <p class="guide-description">
              Click or tap to enter the interactive viewer. Press ESC or click outside the viewer to leave controls.
            </p>
            <p class="guide-footnote">
              Use the guide below as the default control map for desktop and mobile.
            </p>

            <section class="guide-section guide-section-mobile hidden" id="mobileGuide">
              <p class="guide-label">Mobile / Tablet</p>
              <div class="guide-grid guide-grid-mobile">
                <article class="guide-item">
                  <div class="joystick-icon">
                    <span class="joystick-base">
                      <span class="joystick-thumb"></span>
                    </span>
                  </div>
                  <p class="guide-item-title">Move</p>
                  <p class="guide-item-copy">Joystick</p>
                </article>
                <article class="guide-item">
                  <div class="touch-icon">2</div>
                  <p class="guide-item-title">Look around</p>
                  <p class="guide-item-copy">Swipe</p>
                </article>
              </div>
            </section>

            <section class="guide-section guide-section-desktop" id="desktopGuide">
              <p class="guide-label">Desktop</p>
              <div class="guide-grid guide-grid-desktop">
                <article class="guide-item">
                  <p class="guide-item-heading">Move</p>
                  <div class="key-row key-row-single">
                    <span class="keycap">W</span>
                  </div>
                  <div class="key-row">
                    <span class="keycap">A</span>
                    <span class="keycap">S</span>
                    <span class="keycap">D</span>
                  </div>
                </article>
                <article class="guide-item guide-item-center">
                  <p class="guide-item-heading">Vertical Move</p>
                  <div class="key-row key-row-center">
                    <span class="keycap">Q</span>
                    <span class="key-separator">/</span>
                    <span class="keycap">E</span>
                  </div>
                </article>
                <article class="guide-item guide-item-center">
                  <p class="guide-item-heading">Look Around</p>
                  <div class="mouse-chip">Mouse drag</div>
                </article>
              </div>
            </section>
          </div>
        </button>

        <div class="viewer-actions hidden" id="viewerActions">
          <button id="exitButton" class="icon-button" type="button" aria-label="Exit viewer controls">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8.5 7.5v9l8-4.5-8-4.5Z"></path>
            </svg>
          </button>
          <button id="resetButton" class="icon-button" type="button" aria-label="Reset viewer camera">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0 2.3 5.6"></path>
              <path d="M20 4v7h-7"></path>
            </svg>
          </button>
          <button id="collisionButton" class="text-button" type="button" aria-pressed="true">
            Collision On
          </button>
        </div>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
