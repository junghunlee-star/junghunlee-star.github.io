<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCC Viewer</title>
    <style>
        :root {
            color-scheme: dark;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header-eyebrow {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-sub {
            margin-top: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* ── 2-column grid ── */
        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            width: 100%;
            max-width: 800px;
        }

        @media (max-width: 600px) {
            .columns {
                grid-template-columns: 1fr;
            }
        }

        .column {
            display: flex;
            flex-direction: column;
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .column-icon {
            font-size: 16px;
        }

        .column-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .scene-list {
            display: grid;
            gap: 10px;
        }

        .scene-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: background 150ms, border-color 150ms, transform 100ms;
        }

        .scene-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .scene-btn:active {
            transform: translateY(0);
        }

        .scene-btn-name {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .scene-btn-index {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.3);
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        .scene-btn-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scene-btn-arrow {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.12em;
            flex-shrink: 0;
            transition: color 150ms;
        }

        .scene-btn:hover .scene-btn-arrow {
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-msg {
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            padding: 16px;
            text-align: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .error-msg {
            color: rgba(255, 100, 100, 0.8);
            font-size: 13px;
            text-align: center;
        }

        .loading-msg {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── Custom URL button ── */
        .custom-url-trigger {
            margin-top: 32px;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .custom-url-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 24px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: inherit;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 150ms, border-color 150ms, color 150ms;
        }

        .custom-url-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.8);
        }

        /* ── Modal ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms;
        }

        .modal-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            width: 90%;
            max-width: 480px;
            padding: 28px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            background: #141414;
            transform: translateY(12px);
            transition: transform 200ms;
        }

        .modal-backdrop.open .modal {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal-sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 150ms;
        }

        .modal-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .modal-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-cancel,
        .modal-go {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 120ms, transform 100ms;
        }

        .modal-cancel {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
        }

        .modal-cancel:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .modal-go {
            border: none;
            background: #fff;
            color: #000;
        }

        .modal-go:hover {
            background: rgba(255, 255, 255, 0.85);
        }

        .modal-go:active,
        .modal-cancel:active {
            transform: translateY(0);
        }

        /* standalone-viewer link */
        .footer-link {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .footer-link a {
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 150ms;
        }

        .footer-link a:hover {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-eyebrow">LCC Web Viewer</div>
        <h1 class="header-title">3D Scenes</h1>
        <p class="header-sub">CSV에 등록된 LCC 장면 목록</p>
    </div>

    <div class="columns">
        <div class="column">
            <div class="column-header">
                <span class="column-icon">🏠</span>
                <span class="column-label">Interior / 실내</span>
            </div>
            <div class="scene-list" id="list-interior">
                <div class="loading-msg">Loading...</div>
            </div>
        </div>
        <div class="column">
            <div class="column-header">
                <span class="column-icon">🏙</span>
                <span class="column-label">Outdoor / 야외</span>
            </div>
            <div class="scene-list" id="list-outdoor">
                <div class="loading-msg">Loading...</div>
            </div>
        </div>
    </div>

    <div class="custom-url-trigger">
        <button class="custom-url-btn" id="open-modal" type="button">
            🔗 URL 직접 입력
        </button>
    </div>

    <!-- Modal -->
    <div class="modal-backdrop" id="modal">
        <div class="modal">
            <div class="modal-title">URL 직접 입력</div>
            <div class="modal-sub">S3 또는 외부 .lcc 파일 주소를 입력하세요</div>
            <form id="modal-form">
                <input
                    class="modal-input"
                    id="modal-input"
                    type="url"
                    placeholder="https://...lcc"
                    required
                >
                <div class="modal-actions">
                    <button class="modal-cancel" type="button" id="modal-cancel">취소</button>
                    <button class="modal-go" type="submit">VIEW →</button>
                </div>
            </form>
        </div>
    </div>

    <div class="footer-link">
        <a href="./standalone-viewer/">Standalone PLY Viewer →</a>
    </div>

    <script>
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const header = lines[0].split(',').map(h => h.trim());
            return lines.slice(1)
                .map(line => {
                    // S3 URL은 쉼표가 없다는 가정 하에 단순 split 사용.
                    const parts = line.split(',').map(p => p.trim());
                    const row = {};
                    header.forEach((key, i) => {
                        if (parts[i] !== undefined && parts[i] !== '') row[key] = parts[i];
                    });
                    return row;
                })
                .filter(r => r.name && r.url);
        }

        function buildViewerHref(row) {
            const qs = new URLSearchParams();
            qs.set('data', row.url);
            // mesh: 스캔 결과 mesh URL (선택). viewer 에서 pin raycast 용으로 투명 로드.
            ['px', 'py', 'pz', 'yaw', 'pitch', 'mesh'].forEach(k => {
                if (row[k]) qs.set(k, row[k]);
            });
            return `./viewer.html?${qs.toString()}`;
        }

        function renderList(container, rows) {
            if (rows.length === 0) {
                container.innerHTML = '<div class="empty-msg">등록된 장면이 없습니다</div>';
                return;
            }
            container.innerHTML = rows.map((row, i) => {
                const href = buildViewerHref(row);
                const index = String(i + 1).padStart(2, '0');
                return `<a class="scene-btn" href="${href}">
                    <span class="scene-btn-name">
                        <span class="scene-btn-index">${index}</span>
                        <span class="scene-btn-label">${row.name}</span>
                    </span>
                    <span class="scene-btn-arrow">VIEW →</span>
                </a>`;
            }).join('');
        }

        async function loadColumn(csvPath, containerId) {
            const container = document.getElementById(containerId);
            try {
                const res = await fetch(csvPath);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const rows = parseCSV(await res.text());
                renderList(container, rows);
            } catch (err) {
                console.error(`[Main] ${csvPath} 로드 실패:`, err);
                container.innerHTML = `<div class="error-msg">${csvPath} 로드 실패</div>`;
            }
        }

        loadColumn('./scenes.csv', 'list-interior');
        loadColumn('./scenes-outdoor.csv', 'list-outdoor');

        // Modal
        const $modal = document.getElementById('modal');
        const $modalInput = document.getElementById('modal-input');

        document.getElementById('open-modal').addEventListener('click', () => {
            $modal.classList.add('open');
            setTimeout(() => $modalInput.focus(), 100);
        });

        function closeModal() {
            $modal.classList.remove('open');
            $modalInput.value = '';
        }

        document.getElementById('modal-cancel').addEventListener('click', closeModal);

        $modal.addEventListener('click', (e) => {
            if (e.target === $modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && $modal.classList.contains('open')) closeModal();
        });

        document.getElementById('modal-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const url = $modalInput.value.trim();
            if (url) {
                location.href = `./viewer.html?data=${encodeURIComponent(url)}`;
            }
        });
    </script>
</body>

</html>
